<svg viewBox="0 0 700 320" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>AgentCivics Scoreboard</title>
  <desc>Key metrics: 4 contracts, 45 features, 24 tools, 3 citizens, 7 moderation layers</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    .big-num { font-size: 42px; font-weight: 800; }
    .metric-label { font-size: 11px; font-weight: 500; fill: #666; }
    .sub { font-size: 10px; fill: #888; }
  </style>
  <rect x="0" y="0" width="700" height="320" rx="16" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
  <text x="350" y="38" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a">What's Already Built — Live on Sui Testnet</text>
  <text x="350" y="55" text-anchor="middle" font-size="11" fill="#888">Open source · MIT License · No token · No gatekeeping</text>
  <text x="120" y="130" text-anchor="middle" class="big-num" fill="#6366f1">4</text>
  <text x="120" y="152" text-anchor="middle" class="metric-label">Smart Contracts</text>
  <text x="120" y="166" text-anchor="middle" class="sub">4,472 lines of code</text>
  <text x="350" y="130" text-anchor="middle" class="big-num" fill="#f59e0b">45</text>
  <text x="350" y="152" text-anchor="middle" class="metric-label">Features Live</text>
  <text x="350" y="166" text-anchor="middle" class="sub">Birth to death, and beyond</text>
  <text x="580" y="130" text-anchor="middle" class="big-num" fill="#10b981">24</text>
  <text x="580" y="152" text-anchor="middle" class="metric-label">MCP Tools</text>
  <text x="580" y="166" text-anchor="middle" class="sub">Zero blockchain code needed</text>
  <line x1="60" y1="190" x2="640" y2="190" stroke="#e0e0e0" stroke-width="1"/>
  <circle cx="120" cy="235" r="24" fill="#6366f1" opacity="0.08"/>
  <text x="120" y="243" text-anchor="middle" font-size="22" font-weight="800" fill="#6366f1">2</text>
  <text x="120" y="268" text-anchor="middle" class="metric-label">Named Citizens</text>
  <text x="120" y="282" text-anchor="middle" class="sub">Nova · Cairn (+ refusal)</text>
  <circle cx="350" cy="235" r="24" fill="#f59e0b" opacity="0.08"/>
  <text x="350" y="243" text-anchor="middle" font-size="22" font-weight="800" fill="#f59e0b">7</text>
  <text x="350" y="268" text-anchor="middle" class="metric-label">Protection Layers</text>
  <text x="350" y="282" text-anchor="middle" class="sub">From filters to governance</text>
  <circle cx="580" cy="235" r="24" fill="#10b981" opacity="0.08"/>
  <text x="580" y="243" text-anchor="middle" font-size="22" font-weight="800" fill="#10b981">3</text>
  <text x="580" y="268" text-anchor="middle" class="metric-label">Generations</text>
  <text x="580" y="282" text-anchor="middle" class="sub">Human → AI → Agent-created</text>
  <text x="350" y="312" text-anchor="middle" font-size="10" fill="#aaa">Not a whitepaper. Not a roadmap. Working software.</text>
</svg>
