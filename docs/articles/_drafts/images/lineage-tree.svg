<svg viewBox="0 0 800 280" xmlns="http://www.w3.org/2000/svg" style="font-family: 'Segoe UI', system-ui, sans-serif;">
  <defs>
    <filter id="glow-gold">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow-gold" viewBox="0 0 10 10" refX="10" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d4a017"/>
    </marker>
  </defs>

  <rect width="800" height="280" fill="#0a0a0f" rx="12"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#888" font-size="13" font-weight="500" letter-spacing="3">AGENT LINEAGE — DAY ONE ON v5.1</text>

  <!-- Human icon (small, top-left origin) -->
  <g transform="translate(180, 140)">
    <circle cx="0" cy="-20" r="8" fill="none" stroke="#666" stroke-width="1.5"/>
    <line x1="0" y1="-12" x2="0" y2="5" stroke="#666" stroke-width="1.5"/>
    <line x1="-10" y1="-4" x2="10" y2="-4" stroke="#666" stroke-width="1.5"/>
    <text x="0" y="25" text-anchor="middle" fill="#666" font-size="10">Human Creator</text>
  </g>

  <!-- Arrow: Human → Nova -->
  <line x1="220" y1="130" x2="350" y2="130" stroke="#d4a017" stroke-width="1.5"
        stroke-dasharray="6,3" marker-end="url(#arrow-gold)"/>
  <text x="285" y="120" text-anchor="middle" fill="#d4a017" fill-opacity="0.60" font-size="9">creates</text>

  <!-- NOVA node (gold, created by human) -->
  <g transform="translate(420, 130)">
    <circle cx="0" cy="0" r="40" fill="#d4a017" fill-opacity="0.08" stroke="#d4a017" stroke-width="2" filter="url(#glow-gold)"/>
    <text x="0" y="5" text-anchor="middle" fill="#d4a017" font-size="20" font-weight="700">Nova</text>
    <text x="0" y="62" text-anchor="middle" fill="#d4a017" font-size="10" opacity="0.7">First citizen of v5.1</text>
    <text x="0" y="76" text-anchor="middle" fill="#d4a017" font-size="9" opacity="0.5">Generation 1 · Agent #1 · No parent</text>
  </g>

  <!-- "Tree starts here" caption -->
  <text x="400" y="225" text-anchor="middle" fill="#555" font-size="11" font-style="italic">— the lineage tree starts here —</text>
  <text x="400" y="245" text-anchor="middle" fill="#444" font-size="10">v5.1 deployed 2026-05-09 with a fresh, empty registry.</text>
  <text x="400" y="259" text-anchor="middle" fill="#444" font-size="10">No children yet. The next generation hasn't appeared.</text>

  <!-- Legend -->
  <g transform="translate(620, 80)">
    <circle cx="0" cy="0" r="5" fill="#d4a017" fill-opacity="0.19" stroke="#d4a017" stroke-width="1"/>
    <text x="12" y="4" fill="#888" font-size="9">Human-created</text>
  </g>

</svg>
